name: cyberguard

services:
  # ─── Backend API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: cyberguard-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://cyberguard:${POSTGRES_PASSWORD}@postgres:5432/cyberguard
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api:ro
    networks:
      - cyberguard-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Celery Worker ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: cyberguard-worker
    restart: unless-stopped
    command: celery -A apps.api.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://cyberguard:${POSTGRES_PASSWORD}@postgres:5432/cyberguard
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cyberguard-net

  # ─── Frontend Dashboard ────────────────────────────────────
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: ../../infra/docker/Dockerfile.dashboard
    container_name: cyberguard-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - cyberguard-net

  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cyberguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cyberguard
      POSTGRES_USER: cyberguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # SECURITY: No port exposure — access only via internal Docker network
    # To connect: docker compose exec postgres psql -U cyberguard -d cyberguard
    networks:
      - cyberguard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberguard -d cyberguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cyberguard-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme_redis}
    volumes:
      - redis_data:/data
    # SECURITY: No port exposure — internal network only
    networks:
      - cyberguard-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible evidence storage) ────────────────
  minio:
    image: minio/minio:latest
    container_name: cyberguard-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_minio}
    volumes:
      - minio_data:/data
    # SECURITY: No port exposure — access via API internal network only
    # Admin console: docker compose exec minio mc alias set local http://localhost:9000 $MINIO_ACCESS_KEY $MINIO_SECRET_KEY
    networks:
      - cyberguard-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Ollama (Gemma LLM) ────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cyberguard-ollama
    restart: unless-stopped
    # SECURITY: No port exposure — API calls Ollama via internal network (http://ollama:11434)
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - cyberguard-net
    # GPU support (uncomment if NVIDIA GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cyberguard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - dashboard
    networks:
      - cyberguard-net

networks:
  cyberguard-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
